<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Explorador de Escola Virtual 3D</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #87ceeb;
        /* Sem pull-to-refresh/encadeamento de rolagem no mobile. */
        overscroll-behavior: none;
      }
      canvas {
        display: block;
        /* Gestos de toque no canvas não rolam/zoomam a página. */
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
